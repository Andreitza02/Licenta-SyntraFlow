services:
  - type: web
    name: syntraflow-ai
    runtime: node
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHATKIT_WORKFLOW_ID
        sync: false
